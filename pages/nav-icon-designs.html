<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Nav Icon Designs</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans JP',sans-serif;background:#F3F4F6;padding:20px;}
h1{font-size:1.2rem;font-weight:900;margin-bottom:24px;color:#1E293B;}
.design-block{background:#fff;border-radius:16px;padding:20px;margin-bottom:24px;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
.design-block h2{font-size:0.85rem;font-weight:800;color:#6366F1;margin-bottom:12px;}
.nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px 4px;max-width:380px;}
.nav-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:10px 4px;border-radius:12px;text-align:center;min-height:70px;cursor:pointer;transition:background 0.15s;}
.nav-item:hover{background:#EFF6FF;}
.nav-label{font-size:0.62rem;font-weight:600;color:#64748B;line-height:1.3;}

/* === Design 1: Solid circle === */
.d1 .nav-ico{width:36px;height:36px;border-radius:50%;background:#3B82F6;display:flex;align-items:center;justify-content:center;}
.d1 .nav-ico svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* === Design 2: Soft rounded square === */
.d2 .nav-ico{width:38px;height:38px;border-radius:10px;background:#EFF6FF;display:flex;align-items:center;justify-content:center;}
.d2 .nav-ico svg{width:20px;height:20px;stroke:#3B82F6;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* === Design 3: Gradient circle === */
.d3 .nav-ico{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#6366F1,#3B82F6);display:flex;align-items:center;justify-content:center;}
.d3 .nav-ico svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* === Design 4: Outline circle === */
.d4 .nav-ico{width:36px;height:36px;border-radius:50%;border:2px solid #3B82F6;display:flex;align-items:center;justify-content:center;}
.d4 .nav-ico svg{width:18px;height:18px;stroke:#3B82F6;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* === Design 5: Icon only (no bg) === */
.d5 .nav-ico{width:28px;height:28px;display:flex;align-items:center;justify-content:center;}
.d5 .nav-ico svg{width:24px;height:24px;stroke:#3B82F6;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}

/* === Design 6: Pill shape === */
.d6 .nav-ico{width:44px;height:30px;border-radius:15px;background:#DBEAFE;display:flex;align-items:center;justify-content:center;}
.d6 .nav-ico svg{width:16px;height:16px;stroke:#2563EB;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* === Design 7: Squircle dark === */
.d7 .nav-ico{width:40px;height:40px;border-radius:12px;background:#1E293B;display:flex;align-items:center;justify-content:center;}
.d7 .nav-ico svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* === Design 8: Glass morphism === */
.d8 .nav-ico{width:38px;height:38px;border-radius:12px;background:rgba(59,130,246,0.12);backdrop-filter:blur(8px);border:1px solid rgba(59,130,246,0.2);display:flex;align-items:center;justify-content:center;}
.d8 .nav-ico svg{width:20px;height:20px;stroke:#2563EB;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* === Design 9: Filled icon (no stroke) === */
.d9 .nav-ico{width:32px;height:32px;display:flex;align-items:center;justify-content:center;}
.d9 .nav-ico svg{width:26px;height:26px;stroke:none;fill:#3B82F6;stroke-width:0;}

/* === Design 10: iOS-style large squircle === */
.d10 .nav-ico{width:44px;height:44px;border-radius:12px;background:linear-gradient(145deg,#60A5FA,#2563EB);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(37,99,235,0.3);}
.d10 .nav-ico svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* === Design 11: Soft shadow circle === */
.d11 .nav-ico{width:38px;height:38px;border-radius:50%;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.1);display:flex;align-items:center;justify-content:center;}
.d11 .nav-ico svg{width:20px;height:20px;stroke:#3B82F6;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* === Design 12: Colored bg per item === */
.d12 .nav-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;}
.d12 .nav-ico svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.d12 .c1{background:#3B82F6;} .d12 .c2{background:#8B5CF6;} .d12 .c3{background:#EF4444;} .d12 .c4{background:#F59E0B;}
.d12 .c5{background:#10B981;} .d12 .c6{background:#06B6D4;} .d12 .c7{background:#EC4899;} .d12 .c8{background:#6366F1;}

/* === Design 13: Outline rounded square === */
.d13 .nav-ico{width:38px;height:38px;border-radius:10px;border:1.5px solid #CBD5E1;display:flex;align-items:center;justify-content:center;}
.d13 .nav-ico svg{width:18px;height:18px;stroke:#475569;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.d13 .nav-label{color:#475569;}

/* === Design 14: Pastel colored bg per item === */
.d14 .nav-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;}
.d14 .nav-ico svg{width:20px;height:20px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.d14 .c1{background:#DBEAFE;} .d14 .c1 svg{stroke:#2563EB;}
.d14 .c2{background:#EDE9FE;} .d14 .c2 svg{stroke:#7C3AED;}
.d14 .c3{background:#FEE2E2;} .d14 .c3 svg{stroke:#DC2626;}
.d14 .c4{background:#FEF3C7;} .d14 .c4 svg{stroke:#D97706;}
.d14 .c5{background:#D1FAE5;} .d14 .c5 svg{stroke:#059669;}
.d14 .c6{background:#CFFAFE;} .d14 .c6 svg{stroke:#0891B2;}
.d14 .c7{background:#FCE7F3;} .d14 .c7 svg{stroke:#DB2777;}
.d14 .c8{background:#E0E7FF;} .d14 .c8 svg{stroke:#4F46E5;}

/* === Design 15: Dot under icon === */
.d15 .nav-ico{width:28px;height:28px;display:flex;align-items:center;justify-content:center;}
.d15 .nav-ico svg{width:24px;height:24px;stroke:#64748B;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.d15 .nav-item.active .nav-ico svg{stroke:#3B82F6;}
.d15 .nav-dot{width:4px;height:4px;border-radius:50%;background:transparent;margin-top:-2px;}
.d15 .nav-item.active .nav-dot{background:#3B82F6;}

/* === Design 16: Mini card === */
.d16 .nav-item{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:12px;padding:10px 6px;}
.d16 .nav-ico{width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.d16 .nav-ico svg{width:20px;height:20px;stroke:#3B82F6;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* === Design 17: Bottom bar style === */
.d17 .nav-grid{grid-template-columns:repeat(4,1fr);background:#fff;border-radius:20px;padding:8px;box-shadow:0 -2px 12px rgba(0,0,0,0.06);}
.d17 .nav-item{min-height:56px;gap:3px;}
.d17 .nav-ico{width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.d17 .nav-ico svg{width:22px;height:22px;stroke:#94A3B8;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.d17 .nav-item.active .nav-ico svg{stroke:#3B82F6;}
.d17 .nav-item.active .nav-label{color:#3B82F6;}

/* === Design 18: Gradient border === */
.d18 .nav-ico{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#3B82F6,#8B5CF6);padding:2px;display:flex;align-items:center;justify-content:center;}
.d18 .nav-ico-inner{width:100%;height:100%;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;}
.d18 .nav-ico svg{width:18px;height:18px;stroke:#3B82F6;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* === Design 19: Neumorphism === */
.d19 .nav-ico{width:40px;height:40px;border-radius:12px;background:#F1F5F9;box-shadow:3px 3px 6px #d1d5db,-3px -3px 6px #ffffff;display:flex;align-items:center;justify-content:center;}
.d19 .nav-ico svg{width:20px;height:20px;stroke:#475569;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* === Design 20: Material You style === */
.d20 .nav-item{border-radius:16px;padding:8px 4px 10px;}
.d20 .nav-ico{width:48px;height:28px;border-radius:14px;background:#DBEAFE;display:flex;align-items:center;justify-content:center;}
.d20 .nav-ico svg{width:18px;height:18px;stroke:#1D4ED8;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.d20 .nav-item.active .nav-ico{background:#3B82F6;}
.d20 .nav-item.active .nav-ico svg{stroke:#fff;}
.d20 .nav-item.active .nav-label{color:#1D4ED8;font-weight:700;}
</style>
</head>
<body>
<h1>Mobile Nav Icon Designs (20 Variations)</h1>

<script>
// 8 icons as reusable SVG
const icons = [
  `<svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
  `<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
  `<svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
  `<svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`,
  `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`,
  `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><circle cx="12" cy="15" r="2"/></svg>`,
  `<svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>`,
  `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`
];
const labels = ['はじめに','スケジュール','ICUの方針','学習・評価','論文GL(ICU)','論文GL(外来)','疾患マニュアル','FAQ'];
const colorClasses = ['c1','c2','c3','c4','c5','c6','c7','c8'];

function grid(cls, extra) {
  let html = '<div class="nav-grid">';
  for (let i=0;i<8;i++) {
    const act = i===0?' active':'';
    const cc = extra ? ` ${colorClasses[i]}` : '';
    html += `<div class="nav-item${act}">`;
    if (cls==='d15') {
      html += `<div class="nav-ico${cc}">${icons[i]}</div><div class="nav-dot"></div><span class="nav-label">${labels[i]}</span>`;
    } else if (cls==='d18') {
      html += `<div class="nav-ico${cc}"><div class="nav-ico-inner">${icons[i]}</div></div><span class="nav-label">${labels[i]}</span>`;
    } else {
      html += `<div class="nav-ico${cc}">${icons[i]}</div><span class="nav-label">${labels[i]}</span>`;
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

const designs = [
  {id:'d1',  name:'#1 Solid Circle (Blue)'},
  {id:'d2',  name:'#2 Soft Rounded Square'},
  {id:'d3',  name:'#3 Gradient Circle'},
  {id:'d4',  name:'#4 Outline Circle'},
  {id:'d5',  name:'#5 Icon Only (No BG)'},
  {id:'d6',  name:'#6 Pill Shape'},
  {id:'d7',  name:'#7 Dark Squircle'},
  {id:'d8',  name:'#8 Glass Morphism'},
  {id:'d9',  name:'#9 Filled Icon'},
  {id:'d10', name:'#10 iOS Squircle (Gradient + Shadow)'},
  {id:'d11', name:'#11 White Circle + Shadow'},
  {id:'d12', name:'#12 Colored per Item (Solid)', color:true},
  {id:'d13', name:'#13 Outline Rounded Square (Gray)'},
  {id:'d14', name:'#14 Pastel per Item', color:true},
  {id:'d15', name:'#15 Dot Indicator'},
  {id:'d16', name:'#16 Mini Card'},
  {id:'d17', name:'#17 Bottom Bar Style'},
  {id:'d18', name:'#18 Gradient Border'},
  {id:'d19', name:'#19 Neumorphism'},
  {id:'d20', name:'#20 Material You (Pill Active)'},
];

let out='';
designs.forEach(d=>{
  out += `<div class="design-block ${d.id}"><h2>${d.name}</h2>${grid(d.id, d.color)}</div>`;
});
document.body.insertAdjacentHTML('beforeend', out);
</script>
</body>
</html>
