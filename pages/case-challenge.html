<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>症例問題に挑戦！ | 聖路加ICU</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="../images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style-v2.css?v=20260623b">
  <style>
    .subpage-hero { background: linear-gradient(150deg, #08214A 0%, #1269B0 55%, #1586C0 100%) !important; }
    .case-wrap { max-width:980px;margin:0 auto;padding:32px 20px 60px; }
    /* 列：140px 画像 / 1fr タイトル / 200px 難易度バッヂ / 40px 矢印 */
    .case-card { display:grid;grid-template-columns:140px minmax(0,1fr) 200px 40px;gap:0 18px;align-items:center;padding:16px 18px;border-bottom:1px solid var(--border);text-decoration:none;color:var(--text);transition:background 0.15s;cursor:pointer; }
    .case-card:last-child { border-bottom:none; }
    .case-card:hover { background:#EFF6FF; }
    .case-img { width:140px;height:auto;border-radius:6px;border:1px solid var(--border); }
    .case-title-wrap { display:flex;flex-direction:column;gap:4px;min-width:0; }
    .case-num { display:inline-block;align-self:flex-start;background:#08214A;color:#fff;font-size:0.62rem;font-weight:800;letter-spacing:0.08em;padding:2px 8px;border-radius:4px; }
    .case-title { font-size:0.92rem;font-weight:700;color:var(--text);line-height:1.5; }
    /* 難易度バッヂ（表紙の4段ドット＋ラベルを再現） */
    .case-badge { display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:5px 13px;white-space:nowrap;justify-self:center;font-size:0.72rem;font-weight:800;border:1px solid currentColor; }
    .case-dots { display:inline-flex;gap:3px; }
    .case-dots i { width:7px;height:7px;border-radius:50%;background:#CBD5E1;display:inline-block; }
    .case-arrow { color:var(--muted);font-size:0.85rem;justify-self:end; }

    @media (max-width:600px) {
      .case-card { grid-template-columns:96px 1fr;gap:8px 12px;align-items:start; }
      .case-img { width:96px; }
      .case-badge { grid-column:2;justify-self:start;margin-top:2px; }
      .case-arrow { display:none; }
    }
  </style>
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="../index.html" class="nav-logo">
        <img src="../images/logo.png" alt="ST. LUKE'S ICU" class="nav-logo-img">
        <span class="nav-logo-text">聖路加国際病院ICU</span>
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="メニューを開く">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-menu" id="navMenu"></ul>
    </div>
  </nav>

  <!-- ===== PAGE HEADER ===== -->
  <div class="subpage-hero">
    <div class="container">
      <a href="../index.html" class="back-link">← メインページへ戻る</a>
      <h1 class="subpage-title">症例問題に挑戦！</h1>
      <p class="subpage-subtitle">ICU CASE CHALLENGE</p>
    </div>
  </div>

  <!-- ===== CONTENT ===== -->
  <div class="case-wrap">

    <!-- 概要 -->
    <div class="card" style="margin-bottom:24px;">
      <div class="card-inner">
        <h3 class="card-section-title">概要</h3>
        <p style="font-size:0.875rem; color:var(--muted); line-height:1.8;">実際の症例をもとにしたクイズ形式の症例問題集です。表紙に難易度（Lv.1〜Lv.4）が示されています。自分のレベルに合わせて挑戦してみましょう。PDFデータはセキュリティの観点から、聖路加ICUのTeamsに参加している間のみアクセスできます。</p>
      </div>
    </div>

    <!-- ═══ 症例一覧 ═══ -->
    <div class="card" style="margin-bottom:8px;">
      <div class="card-inner" style="padding:0;">

        <a href="https://lukemcmi.sharepoint.com/:b:/s/ms_teams_1102831/IQD8de1pLrrfQYqxX9UB59xdAdZSY0phFyk0MObN6ecpYjU?e=6KqUAB" target="_blank" rel="noopener" class="case-card">
          <img src="../images/case-02-cover.png" alt="CASE 02 50代男性・帰宅中に倒れて搬送" class="case-img">
          <span class="case-title-wrap">
            <span class="case-num">CASE 02</span>
            <span class="case-title">50代男性・帰宅中に倒れて搬送</span>
          </span>
          <span class="case-badge" style="color:#B07012;background:#FBF1E0;">
            <span class="case-dots"><i style="background:#E2992B;"></i><i style="background:#E2992B;"></i><i style="background:#E2992B;"></i><i></i></span>
            Lv.3 専攻医
          </span>
          <span class="case-arrow">→</span>
        </a>

        <a href="https://lukemcmi.sharepoint.com/:b:/s/ms_teams_1102831/IQCRQUyRKIggQLYf9ORtudHWAXwcadMAfZ7YlHaNSWtZ0gA?e=7CVyb1" target="_blank" rel="noopener" class="case-card">
          <img src="../images/case-03-cover.png" alt="CASE 03 80代男性・前日からものが二重に見える" class="case-img">
          <span class="case-title-wrap">
            <span class="case-num">CASE 03</span>
            <span class="case-title">80代男性・前日からものが二重に見える</span>
          </span>
          <span class="case-badge" style="color:#3E6FA0;background:#EEF4FB;">
            <span class="case-dots"><i style="background:#6E9BC4;"></i><i style="background:#6E9BC4;"></i><i></i><i></i></span>
            Lv.2 初期研修医＋
          </span>
          <span class="case-arrow">→</span>
        </a>

      </div>
    </div>

  </div><!-- /.case-wrap -->

  <script src="../script.js?v=20260623b"></script>
</body>
</html>
