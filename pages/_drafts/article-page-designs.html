<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GL一覧ページ UI Designs（20種）</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans JP',sans-serif;background:#F3F4F6;padding:16px;color:#1A202C;font-size:14px;}
h1{font-size:1.1rem;font-weight:900;margin-bottom:6px;}
p.desc{font-size:0.75rem;color:#6B7280;margin-bottom:20px;}
.design{background:#fff;border-radius:16px;padding:20px;margin-bottom:28px;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
.design h2{font-size:0.82rem;font-weight:800;color:#6366F1;margin-bottom:14px;padding-bottom:6px;border-bottom:2px solid #E0E7FF;}
a{text-decoration:none;color:inherit;}
.mock{max-width:780px;}

/* ── Shared art-box base ── */
.abx{border-radius:8px;overflow:hidden;border:1px solid #E2E8F0;margin-bottom:8px;}
.abx table{width:100%;border-collapse:collapse;}
.abx tr:nth-child(odd) td{background:#F8FAFC;}
.abx tr:nth-child(even) td{background:#fff;}
.abx td{padding:7px 12px;font-size:0.8rem;border-bottom:1px solid #E2E8F0;vertical-align:middle;}
.abx td:first-child{width:68px;font-size:0.65rem;color:#9CA3AF;font-variant-numeric:tabular-nums;}
.abx tr:last-child td{border-bottom:none;}
.abx tr:hover td{background:#DBEAFE !important;}
.abx a{text-decoration:none;color:var(--text,#1A202C);font-weight:500;font-size:0.8rem;}
.abx a:hover{color:#2D7A4F;}
.abx-h{padding:6px 12px;font-size:0.7rem;font-weight:800;}

/* ===== System Header Variants ===== */

/* #1 Current: グラデ2トーン+番号 */
.s1{display:flex;border-radius:8px;overflow:hidden;margin-bottom:0;}
.s1 .num{background:linear-gradient(135deg,#1A3A2A,#2D5A3F);color:#fff;padding:4px 8px;display:flex;align-items:center;font-size:0.8rem;font-weight:900;opacity:0.6;}
.s1 .lbl{background:linear-gradient(135deg,#2D7A4F,#3D9B65);color:#fff;padding:6px 12px;flex:1;}
.s1 .en{font-size:0.82rem;font-weight:700;}
.s1 .jp{font-size:0.62rem;color:rgba(255,255,255,0.7);}

/* #2 Pastel banner */
.s2{background:#E0F2E9;border-radius:10px;padding:10px 16px;margin-bottom:0;display:flex;align-items:center;gap:10px;}
.s2 .num{font-size:0.7rem;font-weight:900;color:#2D7A4F;opacity:0.5;}
.s2 .en{font-size:0.85rem;font-weight:800;color:#166534;}
.s2 .jp{font-size:0.65rem;color:#2D7A4F;margin-left:6px;}

/* #3 Minimal line */
.s3{display:flex;align-items:baseline;gap:10px;padding:10px 0 6px;border-bottom:2px solid #2D7A4F;margin-bottom:0;}
.s3 .num{font-size:0.65rem;font-weight:900;color:#9CA3AF;}
.s3 .en{font-size:0.9rem;font-weight:800;color:#1A202C;}
.s3 .jp{font-size:0.65rem;color:#9CA3AF;}

/* #4 Pill + Subtitle */
.s4{display:flex;align-items:center;gap:10px;padding:8px 0;margin-bottom:0;}
.s4 .pill{background:#2D7A4F;color:#fff;font-size:0.6rem;font-weight:800;padding:3px 10px;border-radius:12px;}
.s4 .en{font-size:0.85rem;font-weight:800;color:#1A202C;}
.s4 .jp{font-size:0.62rem;color:#9CA3AF;margin-left:4px;}

/* #5 Icon + Text */
.s5{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #E2E8F0;margin-bottom:0;}
.s5 .ico{width:32px;height:32px;background:#E0F2E9;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.9rem;}
.s5 .en{font-size:0.85rem;font-weight:800;color:#1A202C;}
.s5 .jp{font-size:0.62rem;color:#9CA3AF;}
.s5 .cnt{margin-left:auto;font-size:0.6rem;font-weight:700;background:#F1F5F9;color:#6B7280;padding:2px 8px;border-radius:8px;}

/* #6 Tab-style */
.s6{display:flex;align-items:stretch;border-bottom:2px solid #E2E8F0;margin-bottom:0;padding:0;}
.s6 .tab{padding:8px 14px;font-size:0.78rem;font-weight:700;color:#9CA3AF;border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;}
.s6 .tab.active{color:#2D7A4F;border-bottom-color:#2D7A4F;}

/* #7 Left accent dot */
.s7{display:flex;align-items:center;gap:10px;padding:10px 0;margin-bottom:0;}
.s7 .dot{width:10px;height:10px;border-radius:50%;background:#2D7A4F;}
.s7 .en{font-size:0.88rem;font-weight:800;color:#1A202C;}
.s7 .jp{font-size:0.62rem;color:#9CA3AF;margin-left:4px;}

/* #8 Card header with shadow */
.s8{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:10px 16px;margin-bottom:0;box-shadow:0 2px 6px rgba(0,0,0,0.04);display:flex;align-items:center;gap:10px;}
.s8 .num-badge{width:28px;height:28px;background:#2D7A4F;color:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:900;}
.s8 .en{font-size:0.85rem;font-weight:800;color:#1A202C;}
.s8 .jp{font-size:0.62rem;color:#9CA3AF;}

/* #9 Dark minimal */
.s9{background:#1A202C;border-radius:8px;padding:8px 14px;margin-bottom:0;display:flex;align-items:center;gap:10px;}
.s9 .num{font-size:0.65rem;font-weight:900;color:#4B5563;}
.s9 .en{font-size:0.82rem;font-weight:700;color:#F9FAFB;}
.s9 .jp{font-size:0.62rem;color:#6B7280;margin-left:6px;}

/* #10 Gradient underline */
.s10{padding:10px 0 8px;margin-bottom:0;position:relative;}
.s10::after{content:'';position:absolute;bottom:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,#2D7A4F,#60A5FA,transparent);border-radius:2px;}
.s10 .en{font-size:0.88rem;font-weight:800;color:#1A202C;}
.s10 .jp{font-size:0.62rem;color:#9CA3AF;margin-left:8px;}

/* ===== Art-box Header Variants ===== */

/* B1 Current pastel */
.b1 .abx-h{background:#E0F2E9;color:#166534;border-bottom:1px solid #BBF7D0;}
/* B2 White + bold left */
.b2 .abx-h{background:#FAFAFA;color:#1A202C;border-bottom:1px solid #E2E8F0;padding-left:14px;}
.b2 .abx-h::before{content:'';display:inline-block;width:3px;height:12px;background:#2D7A4F;border-radius:2px;margin-right:8px;vertical-align:middle;}
/* B3 Transparent + underline */
.b3 .abx-h{background:transparent;color:#2D7A4F;border-bottom:2px solid #D1FAE5;font-size:0.72rem;}
/* B4 Left dot */
.b4 .abx-h{background:#FAFAFA;color:#1A202C;border-bottom:1px solid #E2E8F0;}
.b4 .abx-h::before{content:'';display:inline-block;width:6px;height:6px;background:#2D7A4F;border-radius:50%;margin-right:8px;vertical-align:middle;}
/* B5 Chip style */
.b5 .abx{border:none;margin-bottom:12px;}
.b5 .abx-h{background:transparent;padding:0 0 6px;color:#2D7A4F;font-size:0.68rem;letter-spacing:0.06em;border-bottom:none;}
.b5 .abx table{border:1px solid #E2E8F0;border-radius:8px;overflow:hidden;}

/* ===== Combined Page Layouts ===== */
</style>
</head>
<body>
<h1>GL一覧ページ UI — 20バリエーション</h1>
<p class="desc">システムヘッダ（#1 Neurological System等）× サブカテゴリヘッダ（脳梗塞等）の組み合わせ20種。実データで表示。</p>

<script>
const boxes = [
  ['脳梗塞・脳卒中', [['04/01','脳卒中治療GL 2021〔改訂2025〕（日本脳卒中学会）']]],
  ['くも膜下出血', [['03/30','AHA/ASA 2023 くも膜下出血（aSAH）管理GL'],['03/31','aSAH後合併症の管理戦略レビュー（Critical Care 2025）']]],
  ['アルコール離脱', [['03/31','AWS 神経集中治療における評価と治療（Neurocrit Care 2021）']]],
];

function tbl(items){return '<table>'+items.map(([d,t])=>`<tr><td>${d}</td><td><a href="#">${t}</a></td></tr>`).join('')+'</table>';}

function abxs(bcls){return boxes.map(([cat,items])=>`<div class="abx"><div class="abx-h">${cat}</div>${tbl(items)}</div>`).join('');}

const designs = [
  // System header variants × box variants
  {id:'1', label:'#1 現行デザイン（グラデ2トーン+パステルBOX）',
   sys:`<div class="s1"><div class="num">#1</div><div class="lbl"><div class="en">Neurological System</div><div class="jp">神経系</div></div></div>`,
   bcls:'b1'},
  {id:'2', label:'#2 パステルバナー + パステルBOX',
   sys:`<div class="s2"><span class="num">#1</span><span class="en">Neurological System</span><span class="jp">神経系</span></div>`,
   bcls:'b1'},
  {id:'3', label:'#3 ミニマルライン + 白ヘッダ+左アクセント',
   sys:`<div class="s3"><span class="num">#1</span><span class="en">Neurological System</span><span class="jp">神経系</span></div>`,
   bcls:'b2'},
  {id:'4', label:'#4 ピルバッジ + 左ドットBOX',
   sys:`<div class="s4"><span class="pill">#1</span><span class="en">Neurological System</span><span class="jp">神経系</span></div>`,
   bcls:'b4'},
  {id:'5', label:'#5 アイコン+件数 + パステルBOX',
   sys:`<div class="s5"><span class="ico">🧠</span><div><div class="en">Neurological System</div><div class="jp">神経系</div></div><span class="cnt">4件</span></div>`,
   bcls:'b1'},
  {id:'6', label:'#6 タブ風 + パステルBOX',
   sys:`<div class="s6"><span class="tab active">神経系</span><span class="tab">循環器</span><span class="tab">呼吸器</span><span class="tab">...</span></div>`,
   bcls:'b1'},
  {id:'7', label:'#7 ドットマーカー + 下線BOX',
   sys:`<div class="s7"><span class="dot"></span><span class="en">Neurological System</span><span class="jp">神経系</span></div>`,
   bcls:'b3'},
  {id:'8', label:'#8 カード型ヘッダ + チップBOX',
   sys:`<div class="s8"><span class="num-badge">1</span><div><div class="en">Neurological System</div><div class="jp">神経系</div></div></div>`,
   bcls:'b5'},
  {id:'9', label:'#9 ダークミニマル + パステルBOX',
   sys:`<div class="s9"><span class="num">#1</span><span class="en">Neurological System</span><span class="jp">神経系</span></div>`,
   bcls:'b1'},
  {id:'10', label:'#10 グラデ下線 + 白ヘッダ+左アクセント',
   sys:`<div class="s10"><span class="en">Neurological System</span><span class="jp">神経系</span></div>`,
   bcls:'b2'},
  {id:'11', label:'#11 パステルバナー + 左ドットBOX',
   sys:`<div class="s2"><span class="num">#1</span><span class="en">Neurological System</span><span class="jp">神経系</span></div>`,
   bcls:'b4'},
  {id:'12', label:'#12 ピルバッジ + 下線BOX',
   sys:`<div class="s4"><span class="pill">#1</span><span class="en">Neurological System</span><span class="jp">神経系</span></div>`,
   bcls:'b3'},
  {id:'13', label:'#13 ミニマルライン + チップBOX',
   sys:`<div class="s3"><span class="num">#1</span><span class="en">Neurological System</span><span class="jp">神経系</span></div>`,
   bcls:'b5'},
  {id:'14', label:'#14 アイコン+件数 + 白ヘッダ+左アクセント',
   sys:`<div class="s5"><span class="ico">🧠</span><div><div class="en">Neurological System</div><div class="jp">神経系</div></div><span class="cnt">4件</span></div>`,
   bcls:'b2'},
  {id:'15', label:'#15 グラデ2トーン + 下線BOX',
   sys:`<div class="s1"><div class="num">#1</div><div class="lbl"><div class="en">Neurological System</div><div class="jp">神経系</div></div></div>`,
   bcls:'b3'},
  {id:'16', label:'#16 ダークミニマル + 左ドットBOX',
   sys:`<div class="s9"><span class="num">#1</span><span class="en">Neurological System</span><span class="jp">神経系</span></div>`,
   bcls:'b4'},
  {id:'17', label:'#17 カード型ヘッダ + パステルBOX',
   sys:`<div class="s8"><span class="num-badge">1</span><div><div class="en">Neurological System</div><div class="jp">神経系</div></div></div>`,
   bcls:'b1'},
  {id:'18', label:'#18 ドットマーカー + 白ヘッダ+左アクセント',
   sys:`<div class="s7"><span class="dot"></span><span class="en">Neurological System</span><span class="jp">神経系</span></div>`,
   bcls:'b2'},
  {id:'19', label:'#19 グラデ下線 + チップBOX',
   sys:`<div class="s10"><span class="en">Neurological System</span><span class="jp">神経系</span></div>`,
   bcls:'b5'},
  {id:'20', label:'#20 パステルバナー + チップBOX（最軽量）',
   sys:`<div class="s2"><span class="num">#1</span><span class="en">Neurological System</span><span class="jp">神経系</span></div>`,
   bcls:'b5'},
];

let html = '';
designs.forEach(d => {
  html += `<div class="design"><h2>${d.label}</h2><div class="mock ${d.bcls}">${d.sys}<div style="margin-top:8px;">${abxs(d.bcls)}</div></div></div>`;
});
document.body.insertAdjacentHTML('beforeend', html);
</script>
</body>
</html>
