<!DOCTYPE html>
<html lang="ja">
<head>

  <link rel="icon" type="image/png" href="../images/logo.png">

  <style>
    .tools-banner {
      width:100%;max-width:1294px;margin:64px auto 0;padding:0;line-height:0;
    }
    .tools-banner img {
      width:100%;height:auto;display:block;
      -webkit-mask-image:linear-gradient(to bottom, #000 0%, #000 85%, transparent 100%);
      mask-image:linear-gradient(to bottom, #000 0%, #000 85%, transparent 100%);
    }
    .page-wrap {
      max-width:1294px;margin:0 auto;
      padding:0 clamp(16px,0.6rem+1.4vw,32px) clamp(40px,2rem+1.5vw,64px);
    }
    .back-wrapper { display:flex;align-items:center;margin:6px 0 12px; }
    .back-btn {
      display:inline-flex;align-items:center;justify-content:center;
      padding:9px 16px;background:rgba(255,255,255,0.85);
      backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.7);border-radius:10px;
      font-size:0.78rem;font-weight:800;color:#6D28D9;text-decoration:none;
      letter-spacing:0.02em;line-height:1;
      box-shadow:0 4px 18px rgba(124,58,237,0.08);
      transition:transform .15s, background .15s;box-sizing:border-box;
    }
    .back-btn:hover { background:rgba(255,255,255,0.95);transform:translateY(-1px); }

    .filter-bar {
      display:flex;flex-wrap:wrap;gap:10px;align-items:center;
      background:#fff;border:1px solid #DDD6FE;border-radius:10px;
      padding:12px 16px;margin-bottom:16px;
      box-shadow:0 2px 8px rgba(124,58,237,0.06);
    }
    .filter-bar label { font-size:0.74rem;font-weight:700;color:#4C1D95;margin-right:4px; }
    .filter-bar select, .filter-bar input[type="search"] {
      font-family:inherit;font-size:0.85rem;
      padding:8px 11px;border:1px solid #DDD6FE;border-radius:6px;
      background:#fff;outline:none;
    }
    .filter-bar select:focus, .filter-bar input[type="search"]:focus {
      border-color:#7C3AED;box-shadow:0 0 0 3px rgba(124,58,237,0.15);
    }
    .filter-bar input[type="search"] {
      flex:1;min-width:200px;font-size:0.92rem;font-weight:600;
    }
    .filter-bar .count {
      margin-left:auto;font-size:0.74rem;color:var(--muted);white-space:nowrap;
    }
    .filter-bar .count strong { color:#7C3AED;font-weight:800; }

    .abbr-table { width:100%;border-collapse:collapse;background:#fff;
      border:1px solid var(--border);border-radius:10px;overflow:hidden;
      box-shadow:0 2px 8px rgba(0,0,0,0.04);
    }
    .abbr-table thead th {
      background:#F5F3FF;color:#4C1D95;font-size:0.74rem;font-weight:800;
      padding:10px 12px;text-align:left;border-bottom:2px solid #DDD6FE;
      white-space:nowrap;
    }
    .abbr-table tbody td {
      padding:9px 12px;font-size:0.84rem;border-bottom:1px solid #F1F5F9;
      vertical-align:middle;color:#475569;line-height:1.6;
    }
    .abbr-table tbody tr:hover td { background:#FAFAFC; }
    .abbr-table tbody tr:last-child td { border-bottom:none; }
    .abbr-table .col-abbr {
      font-family:ui-monospace,Menlo,Consolas,monospace;
      font-weight:800;color:#4C1D95;font-size:0.92rem;width:140px;white-space:nowrap;
    }
    .abbr-table .col-cat { width:120px; }
    .abbr-table .col-full { font-weight:600;color:#1F2937; }
    .abbr-table .col-jp   { color:#475569; }
    .cat-badge {
      display:inline-block;font-size:0.66rem;font-weight:800;
      padding:3px 9px;border-radius:6px;letter-spacing:0.04em;
      white-space:nowrap;
    }
    .cat-circ   { background:#FEE2E2;color:#991B1B; }
    .cat-resp   { background:#DBEAFE;color:#1E40AF; }
    .cat-renal  { background:#FEF3C7;color:#92400E; }
    .cat-neuro  { background:#E9D5FF;color:#6B21A8; }
    .cat-id     { background:#DCFCE7;color:#166534; }
    .cat-gi     { background:#FFEDD5;color:#9A3412; }
    .cat-heme   { background:#FECDD3;color:#9F1239; }
    .cat-endo   { background:#CFFAFE;color:#155E75; }
    .cat-icu    { background:#F3F4F6;color:#374151; }
    .cat-drug   { background:#EDE9FE;color:#5B21B6; }
    .cat-proc   { background:#FCE7F3;color:#9D174D; }
    .cat-lab    { background:#E0E7FF;color:#3730A3; }

    .empty-msg {
      padding:32px;text-align:center;font-size:0.85rem;color:var(--muted);
      background:#fff;border:1px solid var(--border);border-radius:10px;
    }
    .global-tip {
      background:#F5F3FF;border:1px solid #C4B5FD;border-radius:8px;
      padding:11px 16px;margin-bottom:14px;font-size:0.82rem;color:#4C1D95;line-height:1.7;
    }
    .global-tip::before {
      content:'TIP';display:inline-block;background:#7C3AED;color:#fff;
      font-size:0.62rem;font-weight:800;padding:2px 8px;border-radius:3px;
      margin-right:8px;letter-spacing:0.04em;vertical-align:1px;
    }
    @media (max-width:680px) {
      .abbr-table .col-cat,
      .abbr-table thead th.col-cat { display:none; }
    }

</head>
<body>

    <div class="nav-container">
      <a href="../index.html" class="nav-logo">

        <span class="nav-logo-text">聖路加国際病院ICU</span>

  <div class="tools-banner">

  <div class="page-wrap">
    <div class="back-wrapper">

    </div>

    <div class="global-tip">
      ICU・救急・各専門科のカルテで頻用される略語を検索できます。<strong>キーワード検索（略語・正式名称・日本語訳のいずれでも）</strong>と <strong>カテゴリ絞り込み</strong>を併用してください。
    </div>

    <div class="filter-bar">
      <label for="f-cat">カテゴリ：</label>
      <select id="f-cat">
        <option value="">すべて</option>
        <option value="循環">循環</option>
        <option value="呼吸">呼吸</option>
        <option value="腎">腎</option>
        <option value="神経">神経</option>
        <option value="感染">感染</option>
        <option value="消化">消化</option>
        <option value="血液">血液</option>
        <option value="内分泌">内分泌</option>
        <option value="ICU">ICU・モニタ</option>
        <option value="薬剤">薬剤</option>
        <option value="検査">検査</option>
        <option value="手技">手技</option>
      </select>
      <input id="f-search" type="search" placeholder="略語・正式名称・日本語で検索（例: NPPV、bid、デクスメデトミジン）">
      <span class="count">表示：<strong id="row-count">—</strong> / <span id="row-total">—</span> 件</span>
    </div>

    <table class="abbr-table" id="abbr-table">
      <thead>
        <tr>
          <th class="col-abbr">略語</th>
          <th class="col-cat">カテゴリ</th>
          <th class="col-full">正式名称（英語）</th>
          <th class="col-jp">日本語訳・補足</th>
        </tr>
      </thead>
      <tbody id="abbr-body"></tbody>
    </table>
    <div class="empty-msg" id="empty-msg" style="display:none;">該当する略語がありません。</div>

      制作：ICU 関谷 ／ 最終更新：2026-05-05
    </p>
  </div>

      {a:'A-line / V-line / CV', c:'ICU', f:'Arterial / Venous line / Central Venous catheter', j:'動脈ライン / 静脈ライン / 中心静脈カテーテル'},
      {a:'ABCDEF',  c:'ICU', f:'Awakening, Breathing, Coordination, Delirium, Early mobility, Family', j:'ABCDEFバンドル（人工呼吸器離脱促進）'},
      {a:'I/O',    c:'ICU', f:'Intake / Output', j:'水分出納（インアウト）'},
      {a:'NPO',    c:'ICU', f:'Nil per os', j:'絶飲食'},

      // 薬剤（投与・処方）
      {a:'qd / bid / tid / qid', c:'薬剤', f:'quaque die / bis in die / ter in die / quater in die', j:'1日1回 / 2回 / 3回 / 4回'},
      {a:'q4h / q6h / q8h / q12h', c:'薬剤', f:'every 4 / 6 / 8 / 12 hours', j:'4時間 / 6時間 / 8時間 / 12時間 ごと'},
      {a:'prn',    c:'薬剤', f:'pro re nata', j:'頓用（必要時）'},
      {a:'IV / IM / SC / PO', c:'薬剤', f:'Intravenous / Intramuscular / Subcutaneous / Per Os', j:'静注 / 筋注 / 皮下注 / 経口'},
      {a:'DIV',    c:'薬剤', f:'Drip Intravenous Infusion', j:'点滴静注'},
      {a:'IVPB',   c:'薬剤', f:'Intravenous Piggyback', j:'側管点滴'},
      {a:'TDM',    c:'薬剤', f:'Therapeutic Drug Monitoring', j:'薬物血中濃度モニタリング'},
      {a:'AUC',    c:'薬剤', f:'Area Under the Curve', j:'薬物濃度時間曲線下面積'},
      {a:'NSAID',  c:'薬剤', f:'Non-Steroidal Anti-Inflammatory Drug', j:'非ステロイド性抗炎症薬'},
      {a:'PPI',    c:'薬剤', f:'Proton Pump Inhibitor', j:'プロトンポンプ阻害薬'},
      {a:'SSRI / SNRI / NaSSA', c:'薬剤', f:'Selective Serotonin / Serotonin-NE / Noradrenergic Specific Serotonergic Antidepressant', j:'抗うつ薬の作用機序別分類'},
      {a:'DEX',    c:'薬剤', f:'Dexmedetomidine', j:'デクスメデトミジン（鎮静）'},
      {a:'NAD / Adr / DOA / DOB', c:'薬剤', f:'Noradrenaline / Adrenaline / Dopamine / Dobutamine', j:'昇圧薬・強心薬'},

      // 検査
      {a:'CBC',    c:'検査', f:'Complete Blood Count', j:'全血球計算'},
      {a:'WBC / RBC / PLT / Hb / Ht', c:'検査', f:'White / Red Blood Cell / Platelet / Hemoglobin / Hematocrit', j:'白血球 / 赤血球 / 血小板 / ヘモグロビン / ヘマトクリット'},
      {a:'BUN / Cr', c:'検査', f:'Blood Urea Nitrogen / Creatinine', j:'尿素窒素 / クレアチニン'},
      {a:'AST / ALT / γ-GTP / ALP', c:'検査', f:'Aspartate / Alanine Aminotransferase / γ-Glutamyltransferase / Alkaline Phosphatase', j:'肝胆道系酵素'},
      {a:'CK / CK-MB / TnI / TnT', c:'検査', f:'Creatine Kinase / -MB fraction / Troponin I / T', j:'心筋逸脱酵素'},
      {a:'BNP / NT-proBNP', c:'検査', f:'(N-Terminal) Brain Natriuretic Peptide', j:'脳性ナトリウム利尿ペプチド'},
      {a:'CRP',    c:'検査', f:'C-Reactive Protein', j:'C反応性蛋白'},
      {a:'PCT',    c:'検査', f:'Procalcitonin', j:'プロカルシトニン（細菌感染マーカー）'},
      {a:'ABG / VBG', c:'検査', f:'Arterial / Venous Blood Gas', j:'動脈 / 静脈 血液ガス'},
      {a:'BE / AG', c:'検査', f:'Base Excess / Anion Gap', j:'塩基余剰 / アニオンギャップ'},
      {a:'HbA1c',  c:'検査', f:'Hemoglobin A1c', j:'糖化ヘモグロビン'},

      // 手技
      {a:'CPR',    c:'手技', f:'Cardiopulmonary Resuscitation', j:'心肺蘇生'},
      {a:'ACLS',   c:'手技', f:'Advanced Cardiovascular Life Support', j:'二次救命処置'},
      {a:'BLS',    c:'手技', f:'Basic Life Support', j:'一次救命処置'},
      {a:'DC / Defib', c:'手技', f:'Direct Current Cardioversion / Defibrillation', j:'除細動 / カルディオバージョン'},
      {a:'ETT / ETI', c:'手技', f:'Endotracheal Tube / Intubation', j:'気管チューブ / 気管挿管'},
      {a:'TC',     c:'手技', f:'Tracheostomy', j:'気管切開'},
      {a:'NGT / OGT', c:'手技', f:'Nasogastric / Orogastric Tube', j:'経鼻 / 経口 胃管'},
      {a:'PICC',   c:'手技', f:'Peripherally Inserted Central Catheter', j:'末梢挿入中心静脈カテーテル'},
      {a:'POCUS',  c:'手技', f:'Point-of-Care Ultrasound', j:'ベッドサイドエコー'},
      {a:'TTE / TEE', c:'手技', f:'Transthoracic / Transesophageal Echocardiography', j:'経胸壁 / 経食道 心エコー'},
      {a:'LP',     c:'手技', f:'Lumbar Puncture', j:'腰椎穿刺'},

      // その他のよく使う
      {a:'DNAR / DNR', c:'ICU', f:'Do Not Attempt Resuscitation / Do Not Resuscitate', j:'蘇生措置拒否'},
      {a:'EOL',    c:'ICU', f:'End of Life', j:'終末期'},
      {a:'ADL',    c:'ICU', f:'Activities of Daily Living', j:'日常生活動作'},
      {a:'PMH / FH / SH', c:'ICU', f:'Past Medical / Family / Social History', j:'既往歴 / 家族歴 / 社会歴'},
      {a:'CC / HPI', c:'ICU', f:'Chief Complaint / History of Present Illness', j:'主訴 / 現病歴'},
      {a:'ROS',    c:'ICU', f:'Review of Systems', j:'システム別問診'},
      {a:'PE / Px', c:'ICU', f:'Physical Examination', j:'身体所見'},
      {a:'A&P',    c:'ICU', f:'Assessment & Plan', j:'評価と計画（SOAPのA・P）'},
      {a:'SOAP',   c:'ICU', f:'Subjective, Objective, Assessment, Plan', j:'カルテ記載構造'}
    ];

    var CAT_CLASS = {
      '循環':'cat-circ','呼吸':'cat-resp','腎':'cat-renal','神経':'cat-neuro',
      '感染':'cat-id','消化':'cat-gi','血液':'cat-heme','内分泌':'cat-endo',
      'ICU':'cat-icu','薬剤':'cat-drug','検査':'cat-lab','手技':'cat-proc'
    };

    var $body  = document.getElementById('abbr-body');
    var $count = document.getElementById('row-count');
    var $total = document.getElementById('row-total');
    var $empty = document.getElementById('empty-msg');
    var $cat   = document.getElementById('f-cat');
    var $q     = document.getElementById('f-search');

    $total.textContent = ABBREVIATIONS.length;

    function escape(s){ return String(s).replace(/[&<>"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }
    function highlight(text, q){
      if (!q) return escape(text);
      var safe = escape(text);
      var re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
      return safe.replace(re, '<mark style="background:#FEF3C7;color:#78350F;padding:0 2px;border-radius:2px;">$1</mark>');
    }

    function render(){
      var qVal = ($q.value || '').trim().toLowerCase();
      var cVal = $cat.value;
      var rows = ABBREVIATIONS.filter(function(d){
        if (cVal && d.c !== cVal) return false;
        if (qVal) {
          var hay = (d.a + ' ' + d.f + ' ' + d.j).toLowerCase();
          if (hay.indexOf(qVal) === -1) return false;
        }
        return true;
      });
      $count.textContent = rows.length;
      if (rows.length === 0) {
        $body.innerHTML = '';
        $empty.style.display = 'block';
        document.getElementById('abbr-table').style.display = 'none';
      } else {
        $empty.style.display = 'none';
        document.getElementById('abbr-table').style.display = 'table';
        $body.innerHTML = rows.map(function(r){
          var cls = CAT_CLASS[r.c] || 'cat-icu';
          return '<tr>'
            + '<td class="col-abbr">' + highlight(r.a, qVal) + '</td>'
            + '<td class="col-cat"><span class="cat-badge ' + cls + '">' + escape(r.c) + '</span></td>'
            + '<td class="col-full">' + highlight(r.f, qVal) + '</td>'
            + '<td class="col-jp">'   + highlight(r.j, qVal) + '</td>'
            + '</tr>';
        }).join('');
      }
    }
    $cat.addEventListener('change', render);
    $q.addEventListener('input', render);
    render();
  </script>
</body>
</html>
