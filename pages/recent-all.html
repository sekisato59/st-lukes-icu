<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コンテンツ検索 — 全ページ一覧 | 聖路加ICU</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="../images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style-v2.css?v=20260523b">
  <script src="../all-pages.js"></script>
  <script src="../recent-pages.js"></script>
  <script src="../search-index.js"></script>
  <style>
    /* ===== ページレイアウト（フル幅 1 カラム） ===== */
    .page-wrap {
      max-width:1294px;margin:0 auto;
      padding:0 clamp(16px, 0.6rem + 1.4vw, 32px) clamp(40px, 2rem + 1.5vw, 64px);
    }
    .page-main { min-width:0; }

    /* 戻るボタン（検索窓の上に配置・ヘッダーバナー直下） */
    .back-wrapper {
      display:flex;align-items:center;
      margin:6px 0 10px;
    }
    .back-btn {
      display:inline-flex;align-items:center;justify-content:center;
      padding:9px 16px;
      background:rgba(255,255,255,0.85);
      backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.7);
      border-radius:10px;
      font-size:0.78rem;font-weight:800;color:#0D4F8C;
      text-decoration:none;letter-spacing:0.02em;line-height:1;
      box-shadow:0 4px 18px rgba(13,79,140,0.08);
      transition:color .15s, transform .15s, background .15s;
      box-sizing:border-box;
    }
    .back-btn:hover { color:#1269B0;transform:translateY(-1px);background:rgba(255,255,255,0.95); }

    /* フィルタ＆検索 UI */
    .filter-bar {
      display:flex;flex-wrap:wrap;gap:10px;align-items:center;
      background:#fff;border:1px solid var(--border);border-radius:10px;
      padding:12px 16px;margin-bottom:16px;
      box-shadow:0 2px 8px rgba(0,0,0,0.04);
    }
    .filter-bar label { font-size:0.74rem;font-weight:700;color:var(--muted);margin-right:4px; }
    .filter-bar select, .filter-bar input[type="search"] {
      font-family:inherit;font-size:0.82rem;
      padding:7px 10px;border:1px solid var(--border);border-radius:6px;
      background:#fff;outline:none;
    }
    .filter-bar select:focus, .filter-bar input[type="search"]:focus { border-color:#2D7A4F; }
    .filter-bar input[type="search"] { flex:1;min-width:160px; }
    .filter-bar .count { margin-left:auto;font-size:0.74rem;color:var(--muted);white-space:nowrap; }
    .filter-bar .count strong { color:#2D7A4F;font-weight:800; }

    /* 表 */
    .recent-table { width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.04); }
    .recent-table thead th {
      background:#F8FAFC;color:var(--text);font-size:0.74rem;font-weight:800;
      padding:11px 12px;text-align:left;border-bottom:2px solid var(--border);
      cursor:pointer;user-select:none;white-space:nowrap;
      transition:background 0.15s;
    }
    .recent-table thead th:hover { background:#EDF2F7; }
    .recent-table thead th .sort-arrow { font-size:0.6rem;color:#9CA3AF;margin-left:4px; }
    .recent-table thead th.sort-asc .sort-arrow,
    .recent-table thead th.sort-desc .sort-arrow { color:#2D7A4F; }
    .recent-table tbody td {
      padding:9px 12px;font-size:0.82rem;border-bottom:1px solid #F1F5F9;
      vertical-align:middle;
    }
    .recent-table tbody tr:hover td { background:#F0FDF4; }
    .recent-table tbody tr:last-child td { border-bottom:none; }
    .recent-table .col-date    { width:90px;font-size:0.72rem;color:#6B7280;font-variant-numeric:tabular-nums;white-space:nowrap; }
    .recent-table .col-genre   { width:108px; }
    .recent-table .col-type    { width:88px; }
    .recent-table .col-system  { width:128px;font-size:0.74rem;color:#4B5563;white-space:nowrap; }
    .recent-table .col-title a { color:var(--text);text-decoration:none;font-weight:500; }
    .recent-table .col-title a:hover { color:#2D7A4F; }

    /* ジャンルバッジ */
    .genre-badge {
      display:inline-block;font-size:0.66rem;font-weight:800;
      padding:3px 9px;border-radius:6px;letter-spacing:0.04em;
      white-space:nowrap;
    }
    .genre-article  { background:#DCFCE7;color:#166534; }  /* 論文・GL: 緑 */
    .genre-disease  { background:#FFEDD5;color:#9A3412; }  /* 疾患マニュアル: オレンジ */
    .genre-note     { background:#EDE9FE;color:#5B21B6; }  /* 板書ノート: 紫 */
    .genre-exam     { background:#E0E7FF;color:#3730A3; }  /* 試験ノート: インディゴ */
    .genre-staff    { background:#FCE7F3;color:#9D174D; }  /* スタッフ: ピンク */
    .genre-schedule { background:#FEF3C7;color:#92400E; }  /* スケジュール: 黄 */
    .genre-rule     { background:#DBEAFE;color:#1E40AF; }  /* ICUルール: 青 */
    .genre-catalog  { background:#F3F4F6;color:#374151; }  /* カタログ: グレー */

    /* 種別バッジ — 10種類 */
    .type-badge {
      display:inline-block;font-size:0.66rem;font-weight:800;
      padding:3px 9px;border-radius:999px;letter-spacing:0.04em;
      white-space:nowrap;
    }
    .type-rct         { background:#DBEAFE;color:#1E40AF; }
    .type-cohort      { background:#D1FAE5;color:#065F46; }
    .type-casecontrol { background:#FEF3C7;color:#92400E; }
    .type-cross       { background:#FCE7F3;color:#9D174D; }
    .type-meta        { background:#E0E7FF;color:#3730A3; }
    .type-sr          { background:#CFFAFE;color:#155E75; }
    .type-case        { background:#FFE4E6;color:#9F1239; }
    .type-caseseries  { background:#FED7AA;color:#9A3412; }
    .type-review      { background:#E9D5FF;color:#6B21A8; }
    .type-guideline   { background:#FEE2E2;color:#991B1B; }
    .type-empty       { color:#D1D5DB;font-weight:400; }

    .recent-empty { padding:32px;text-align:center;font-size:0.82rem;color:var(--muted); }

    /* 関連度セクション見出し（検索クエリ入力時のみ表示） */
    .rel-divider td {
      padding:10px 14px !important;
      border-top:1px solid var(--border);
      border-bottom:1px solid var(--border);
    }
    .rel-divider-label {
      font-size:0.78rem;font-weight:800;
      letter-spacing:0.02em;
    }
    .rel-divider-count {
      font-size:0.72rem;font-weight:700;color:var(--muted);margin-left:6px;
    }
    .rel-divider-strong td { background:#ECFDF5; }
    .rel-divider-strong .rel-divider-label { color:#15803D; }
    .rel-divider-weak td { background:#FEF9E7; }
    .rel-divider-weak .rel-divider-label { color:#92400E; }

    @media (max-width:768px) {
      .recent-table .col-system,
      .recent-table thead th.col-system { display:none; }
    }
    @media (max-width:560px) {
      .recent-table .col-type,
      .recent-table thead th.col-type { display:none; }
    }
  </style>
</head>

      <a href="../index.html" class="nav-logo">
        <img src="../images/logo.png" alt="ST. LUKE'S ICU" class="nav-logo-img">

      <button class="nav-toggle" id="navToggle" aria-label="メニューを開く">

  </nav>

  <!-- ===== PAGE HEADER (バナー画像 — navbar高さ64pxを margin-top で確保 + 下端のみフェード) ===== -->
  <div style="width:100%;max-width:1294px;margin:64px auto 0;padding:0;line-height:0;">
    <img src="../images/headerサイト内コンテンツ検索.png" alt="サイト内コンテンツ検索 — ジャンル・System・キーワードで全ページから絞り込み"
      style="width:100%;height:auto;display:block;-webkit-mask-image:linear-gradient(to bottom, #000 0%, #000 85%, transparent 100%);mask-image:linear-gradient(to bottom, #000 0%, #000 85%, transparent 100%);">
  </div>

  <!-- ===== CONTENT ===== -->
  <div class="page-wrap">

    <!-- 戻るボタン（検索窓の上に配置） -->
    <div class="back-wrapper">
      <a href="../index.html" class="back-btn">← トップページへ戻る</a>
    </div>

    <div class="page-main">

      <!-- フィルタバー -->
      <div class="filter-bar">
        <label for="f-genre">ジャンル：</label>
        <select id="f-genre">
          <option value="">すべて</option>
        </select>
        <label for="f-type">種別：</label>
        <select id="f-type">
          <option value="">すべて</option>
          <option value="RCT">RCT</option>
          <option value="コホート">コホート</option>
          <option value="症例対照">症例対照</option>
          <option value="横断">横断</option>
          <option value="メタ解析">メタ解析</option>
          <option value="SR">SR</option>
          <option value="Case">Case</option>
          <option value="症例集積">症例集積</option>
          <option value="Review">Review</option>
          <option value="ガイドライン">ガイドライン</option>
        </select>
        <label for="f-system">System：</label>
        <select id="f-system">
          <option value="">すべて</option>
        </select>
        <input id="f-search" type="search" inputmode="search" enterkeyhint="search" autocomplete="off" placeholder="キーワード検索（例：B型肝炎、敗血症、ARDS。スペース区切りでAND検索）" autofocus>
        <span class="count">表示：<strong id="row-count">—</strong> / <span id="row-total">—</span> 件</span>
      </div>

      <!-- 表 -->
      <table class="recent-table" id="recent-table">
        <thead>
          <tr>
            <th class="col-date sort-desc" data-sort="date">日付<span class="sort-arrow">▼</span></th>
            <th class="col-genre" data-sort="genre">ジャンル<span class="sort-arrow">⇅</span></th>
            <th class="col-type" data-sort="type">種別<span class="sort-arrow">⇅</span></th>
            <th class="col-system" data-sort="system">System<span class="sort-arrow">⇅</span></th>
            <th class="col-title" data-sort="title">タイトル<span class="sort-arrow">⇅</span></th>
          </tr>
        </thead>
        <tbody id="recent-body"></tbody>
      </table>
      <div class="recent-empty" id="recent-empty" style="display:none;">該当するページはありません。</div>

    </div>
  </div>

  <script src="../script.js?v=20260523"></script>
  <script src="../abbr-tooltip.js"></script>
  <script>
    (function(){
      var TYPE_CLASS = {
        'RCT':           'type-rct',
        'コホート':       'type-cohort',
        '症例対照':       'type-casecontrol',
        '横断':           'type-cross',
        'メタ解析':       'type-meta',
        'SR':             'type-sr',
        'Case':           'type-case',
        '症例集積':       'type-caseseries',
        'Review':         'type-review',
        'ガイドライン':   'type-guideline'
      };
      var GENRE_CLASS = {
        '論文・GL':       'genre-article',
        '疾患マニュアル': 'genre-disease',
        '板書ノート':     'genre-note',
        '試験ノート':     'genre-exam',
        'スタッフ':       'genre-staff',
        'スケジュール':   'genre-schedule',
        'ICUルール':      'genre-rule',
        'カタログ':       'genre-catalog'
      };

      // ===== ALL_PAGES + RECENT_PAGES マージ =====
      // recent-pages.js に追加された新規ページを自動的に検索 DB に取り込む。
      // すでに all-pages.js に同じ URL がある場合は all-pages.js のメタを優先（重複防止）。
      var data = (typeof ALL_PAGES !== 'undefined' && Array.isArray(ALL_PAGES)) ? ALL_PAGES.slice() : [];

      function classifyByUrl(url) {
        // URL パターンから genre / system を推定
        if (/^pages\/id-icu-notes\//.test(url))     return { genre: '板書ノート', system: 'ID×ICU' };
        if (/^pages\/disease-topics\//.test(url))   return { genre: '疾患マニュアル', system: '' };
        if (/^pages\/exam-/.test(url))              return { genre: '試験ノート',   system: '' };
        if (/^pages\/articles-gl-/.test(url))       return { genre: '論文・GL',     system: '' };
        if (/^pages\/yoshida-qa\//.test(url))       return { genre: '吉田Q&A',      system: '' };
        if (/^pages\/bacteria\//.test(url))         return { genre: '細菌マップ',   system: '感染症' };
        if (/^pages\/articles-guidelines\.html/.test(url)) return { genre: 'カタログ', system: '' };
        if (/^pages\/disease-topics\.html/.test(url))      return { genre: 'カタログ', system: '' };
        if (/^pages\/bacteria-map\.html/.test(url))        return { genre: 'カタログ', system: '感染症' };
        if (/^pages\/yoshida-qa\.html/.test(url))          return { genre: 'カタログ', system: '' };
        return { genre: '', system: '' };
      }
      function tagToType(tag) {
        if (tag === 'ガイドライン') return 'ガイドライン';
        if (tag === '症例')         return 'Case';
        if (tag === '解説')         return 'Review';
        return ''; // 論文等は明示的な type 不明
      }
      function isoToSlash(d) { return (d || '').replace(/-/g, '/'); }
      function stripAnchor(u) { return (u || '').split('#')[0]; }

      if (typeof RECENT_PAGES !== 'undefined' && Array.isArray(RECENT_PAGES)) {
        var existing = {};
        data.forEach(function(d){ if (d.url) existing[d.url] = true; });
        RECENT_PAGES.forEach(function(r){
          if (!r.url || existing[r.url]) return;
          var cls = classifyByUrl(r.url);
          data.push({
            date:      isoToSlash(r.date),
            genre:     cls.genre,
            type:      tagToType(r.tag),
            system:    cls.system,
            system_id: '',
            title:     r.title,
            url:       r.url
          });
          existing[r.url] = true;
        });
      }

      // ===== SEARCH_INDEX から keywords/desc を各エントリに付与 =====
      // search-index.js は親ページ（アンカーなし）と章・節（#anchor 付き）の両方を持つ。
      // 親ページ側の keywords は著者が選んだ主要トピック → 強関連として扱う
      // 章・節側の keywords は補助的トピック → 弱関連
      var kwIndex = {};
      // shape: { 'pages/xxx.html': { mainKw:'', mainDesc:'', subKw:'', subDesc:'', titles:'' } }
      if (typeof SEARCH_INDEX !== 'undefined' && Array.isArray(SEARCH_INDEX)) {
        SEARCH_INDEX.forEach(function(it){
          if (!it.url) return;
          var key = stripAnchor(it.url);
          var isMain = it.url.indexOf('#') === -1;
          if (!kwIndex[key]) kwIndex[key] = { mainKw:'', mainDesc:'', subKw:'', subDesc:'', titles:'' };
          if (isMain) {
            if (it.keywords) kwIndex[key].mainKw   += ' ' + it.keywords;
            if (it.desc)     kwIndex[key].mainDesc += ' ' + it.desc;
          } else {
            if (it.keywords) kwIndex[key].subKw    += ' ' + it.keywords;
            if (it.desc)     kwIndex[key].subDesc  += ' ' + it.desc;
            if (it.title)    kwIndex[key].titles   += ' ' + it.title;
          }
        });
      }
      // 「強関連」フィールドと「弱関連」フィールドを分けて持たせる
      // 強：タイトル / 系統 / ジャンル / 種別 / 章タイトル / 親ページの主要キーワード → ページ主題に直結
      // 弱：親ページの説明文 / 章・節のキーワードと説明文 → ページ内に登場するが主題ではない可能性
      data.forEach(function(d){
        var idx = kwIndex[stripAnchor(d.url)] || {};
        d._strong = (
          (d.title    || '') + ' ' +
          (d.system   || '') + ' ' +
          (d.genre    || '') + ' ' +
          (d.type     || '') + ' ' +
          (idx.titles || '') + ' ' +
          (idx.mainKw || '')
        ).toLowerCase();
        d._weak = (
          (idx.mainDesc || '') + ' ' +
          (idx.subKw    || '') + ' ' +
          (idx.subDesc  || '')
        ).toLowerCase();
        d._search = d._strong + ' ' + d._weak;
      });

      var sortKey = 'date';
      var sortDir = 'desc';

      var $body  = document.getElementById('recent-body');
      var $count = document.getElementById('row-count');
      var $total = document.getElementById('row-total');
      var $empty = document.getElementById('recent-empty');
      var $genre = document.getElementById('f-genre');
      var $sys   = document.getElementById('f-system');
      var $type  = document.getElementById('f-type');
      var $q     = document.getElementById('f-search');
      var $thead = document.querySelectorAll('#recent-table thead th[data-sort]');

      // genre / system filter optionsを構築（実データから）
      var genres = [];
      var systems = [];
      data.forEach(function(d){
        if (d.genre  && genres.indexOf(d.genre)   === -1) genres.push(d.genre);
        if (d.system && systems.indexOf(d.system) === -1) systems.push(d.system);
      });
      // ジャンル: 表示順を固定
      var genreOrder = ['論文・GL', '疾患マニュアル', '板書ノート', '試験ノート', 'ICUルール', 'スケジュール', 'スタッフ', 'カタログ'];
      genres.sort(function(a, b){ return genreOrder.indexOf(a) - genreOrder.indexOf(b); });
      genres.forEach(function(g){
        var opt = document.createElement('option');
        opt.value = g; opt.textContent = g;
        $genre.appendChild(opt);
      });
      systems.sort();
      systems.forEach(function(s){
        var opt = document.createElement('option');
        opt.value = s; opt.textContent = s;
        $sys.appendChild(opt);
      });
      $total.textContent = data.length;

      function escape(s){ return String(s).replace(/[&<>"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }

      // 検索クエリ未入力時の filter（フィルタのみ・関連度なし）
      // 検索クエリあり時は filter + 関連度（strong/weak）+ スコアを計算
      function applyFilter(){
        var gVal    = $genre.value;
        var typeVal = $type.value;
        var sysVal  = $sys.value;
        var qRaw    = ($q.value || '').toLowerCase().trim();
        var tokens  = qRaw ? qRaw.split(/[\s　]+/).filter(Boolean) : [];
        var rows = [];
        data.forEach(function(d){
          if (gVal    && d.genre  !== gVal)    return;
          if (typeVal && d.type   !== typeVal) return;
          if (sysVal  && d.system !== sysVal)  return;
          if (tokens.length === 0) {
            d._relevance = '';
            d._score = 0;
            rows.push(d);
            return;
          }
          // 全トークンが strong または weak のいずれかに含まれていれば採用
          var hayStrong = d._strong || '';
          var hayWeak   = d._weak   || '';
          var hayAll    = hayStrong + ' ' + hayWeak;
          for (var i = 0; i < tokens.length; i++) {
            if (hayAll.indexOf(tokens[i]) === -1) return; // どこにも無い → 除外
          }
          // 関連度判定 + スコアリング
          var allInStrong = true;
          var score = 0;
          var titleLow = (d.title || '').toLowerCase();
          tokens.forEach(function(t){
            if (titleLow.indexOf(t)   !== -1) score += 10;
            if (hayStrong.indexOf(t)  !== -1) score += 4;
            if (hayWeak.indexOf(t)    !== -1) score += 1;
            if (hayStrong.indexOf(t)  === -1) allInStrong = false;
          });
          d._relevance = allInStrong ? 'strong' : 'weak';
          d._score     = score;
          rows.push(d);
        });
        return rows;
      }

      function applySort(rows){
        var dir = sortDir === 'asc' ? 1 : -1;
        return rows.slice().sort(function(a, b){
          var va = a[sortKey] || '';
          var vb = b[sortKey] || '';
          if (va < vb) return -1 * dir;
          if (va > vb) return  1 * dir;
          return 0;
        });
      }

      // 検索アクティブ時：スコア降順 → 同点は date 降順
      function applySortByRelevance(rows){
        return rows.slice().sort(function(a, b){
          if (b._score !== a._score) return b._score - a._score;
          var da = a.date || '', db = b.date || '';
          if (db < da) return -1;
          if (db > da) return  1;
          return 0;
        });
      }

      function rowHTML(r){
        var typeCls  = TYPE_CLASS[r.type]   || '';
        var genreCls = GENRE_CLASS[r.genre] || '';
        var url = '../' + r.url;
        var typeCell = r.type
          ? '<span class="type-badge ' + typeCls + '">' + escape(r.type) + '</span>'
          : '<span class="type-empty">—</span>';
        return '<tr>'
          + '<td class="col-date">' + escape(r.date || '') + '</td>'
          + '<td class="col-genre"><span class="genre-badge ' + genreCls + '">' + escape(r.genre || '') + '</span></td>'
          + '<td class="col-type">' + typeCell + '</td>'
          + '<td class="col-system">' + escape(r.system || '') + '</td>'
          + '<td class="col-title"><a href="' + escape(url) + '">' + escape(r.title) + '</a></td>'
          + '</tr>';
      }

      function sectionRowHTML(kind, label, n){
        return '<tr class="rel-divider rel-divider-' + kind + '"><td colspan="5">'
          + '<span class="rel-divider-label">' + escape(label) + '</span>'
          + '<span class="rel-divider-count">（' + n + ' 件）</span>'
          + '</td></tr>';
      }

      function render(){
        var qActive = (($q.value || '').trim().length > 0);
        var rows = applyFilter();

        if (rows.length === 0) {
          $body.innerHTML = '';
          $count.textContent = 0;
          $empty.style.display = 'block';
          updateSortArrows();
          return;
        }
        $empty.style.display = 'none';
        $count.textContent = rows.length;

        var html = '';
        if (!qActive) {
          // 検索なし：従来通り（クリックされた列でソート）
          html = applySort(rows).map(rowHTML).join('');
        } else {
          // 検索あり：strong / weak に分割
          var strong = [], weak = [];
          rows.forEach(function(r){
            if (r._relevance === 'strong') strong.push(r);
            else weak.push(r);
          });
          // 各グループ内でソート：ユーザーが列ヘッダをクリックしていればその列で、
          // そうでなければ関連度スコア降順。
          var strongSorted = (sortKey === 'date' && sortDir === 'desc')
            ? applySortByRelevance(strong)
            : applySort(strong);
          var weakSorted = (sortKey === 'date' && sortDir === 'desc')
            ? applySortByRelevance(weak)
            : applySort(weak);
          if (strongSorted.length) {
            html += sectionRowHTML('strong', '検索ワードに強く関連するページ', strongSorted.length);
            html += strongSorted.map(rowHTML).join('');
          }
          if (weakSorted.length) {
            html += sectionRowHTML('weak', '関連は薄いがページ内に検索ワードを含むページ', weakSorted.length);
            html += weakSorted.map(rowHTML).join('');
          }
        }
        $body.innerHTML = html;
        updateSortArrows();
      }

      function updateSortArrows(){
        $thead.forEach(function(th){
          var arrow = th.querySelector('.sort-arrow');
          if (th.dataset.sort === sortKey) {
            th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
            th.classList.remove(sortDir === 'asc' ? 'sort-desc' : 'sort-asc');
            arrow.textContent = sortDir === 'asc' ? '▲' : '▼';
          } else {
            th.classList.remove('sort-asc', 'sort-desc');
            arrow.textContent = '⇅';
          }
        });
      }

      $thead.forEach(function(th){
        th.addEventListener('click', function(){
          var key = th.dataset.sort;
          if (sortKey === key) {
            sortDir = (sortDir === 'asc') ? 'desc' : 'asc';
          } else {
            sortKey = key;
            sortDir = (key === 'date') ? 'desc' : 'asc';
          }
          render();
        });
      });
      $genre.addEventListener('change', render);
      $sys.addEventListener('change', render);
      $type.addEventListener('change', render);
      $q.addEventListener('input', render);

      render();

      // ===== モバイル含めてページ open 時に検索窓へフォーカス＋キーボード起動を試みる =====
      // 注: iOS Safari は user gesture なしのプログラム的フォーカスではキーボードを開かない
      // ことが多い。Android Chrome や PC ブラウザでは確実に発火する。
      // iOS でも初回タップ／スクロールなどの user gesture を 1 度でも検出したら即座に focus する。
      function focusSearch(){
        try {
          $q.focus({ preventScroll: true });
          $q.click();
          if (typeof $q.setSelectionRange === 'function') {
            $q.setSelectionRange($q.value.length, $q.value.length);
          }
        } catch (e) {}
      }
      // 即座に試す（PC・Android Chrome ではこれだけでキーボードが立ち上がる）
      focusSearch();
      // 描画安定後に再試行（layout 完了後の方が高確率で成功する端末がある）
      requestAnimationFrame(function(){ requestAnimationFrame(focusSearch); });
      setTimeout(focusSearch, 50);
      setTimeout(focusSearch, 250);
      // iOS Safari 対策：初回 user gesture（タップ／スクロール／キー入力）を 1 度検出したら即フォーカス
      var firstGestureHandlers = ['touchstart','pointerdown','click','keydown','scroll'];
      function onFirstGesture(){
        focusSearch();
        firstGestureHandlers.forEach(function(ev){
          window.removeEventListener(ev, onFirstGesture, true);
        });
      }
      firstGestureHandlers.forEach(function(ev){
        window.addEventListener(ev, onFirstGesture, { capture: true, once: false, passive: true });
      });
    })();
  </script>
</body>
</html>
